name: seoapuzzle
description: 찍은 사진이 퍼즐이 되는 마법 - SeoaPuzzle for kids aged 6-8
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Game engine
  flame: ^1.17.0

  # Camera & image selection
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Image processing
  image: ^4.1.3

  # Local storage
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Audio
  audioplayers: ^6.0.0

  # In-app purchase
  in_app_purchase: ^3.1.13

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  collection: ^1.18.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.3
  riverpod_lint: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: NanumRound
      fonts:
        - asset: assets/fonts/NanumRoundR.ttf
        - asset: assets/fonts/NanumRoundB.ttf
          weight: 700
        - asset: assets/fonts/NanumRoundEB.ttf
          weight: 800
